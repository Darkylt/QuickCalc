<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuickCalc</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
  <style>
    .body {
      background: rgba(17, 17, 17, 0.6);
      backdrop-filter: blur(20px);
    }

    html, body {
      margin: 0;
      padding: 0;
    }
  </style>
  <style>
    ::-webkit-scrollbar {
      width: 5px;
      background: transparent;
    }

    ::-webkit-scrollbar-track {
      background: rgba(25, 15, 40, 0.35);
      border-radius: 10px;
      box-shadow: inset 0 0 6px rgba(160, 60, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(
        180deg,
        rgba(160, 60, 255, 0.55),
        rgba(120, 45, 220, 0.65)
      );
      border-radius: 10px;

      box-shadow:
        0 0 10px rgba(160, 60, 255, 0.45),
        0 0 4px rgba(160, 60, 255, 0.35) inset;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(
        180deg,
        rgba(180, 90, 255, 0.7),
        rgba(140, 60, 240, 0.8)
      );
      box-shadow:
        0 0 14px rgba(180, 80, 255, 0.55),
        0 0 6px rgba(180, 80, 255, 0.45) inset;
    }

    ::-webkit-scrollbar-corner {
      background: rgba(25, 15, 40, 0.4);
    }
  </style>

</html>
